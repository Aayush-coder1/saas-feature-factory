version: "3.9"

services:
  demo-runner:
    image: nikolaik/python-nodejs:python3.12-nodejs22-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      sh -c "
        cd /workspace/sample-app &&
        npm install &&
        npx vitest run &&
        cd /workspace/agents &&
        python -m agents.orchestrator.cli demo
      "
    profiles:
      - demo
