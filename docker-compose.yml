version: "3.9"

services:
  # Sample SaaS Application
  sample-app:
    build:
      context: ./sample-app
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Test Runner (for isolated QA)
  test-runner:
    build:
      context: ./sample-app
      dockerfile: Dockerfile.test
    volumes:
      - ./sample-app:/app
    profiles:
      - test
    command: npx vitest run

  # Agent Environment
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    volumes:
      - ./sample-app:/workspace/sample-app
      - ./.band_store:/workspace/.band_store
    env_file:
      - .env
    profiles:
      - agents
    depends_on:
      - sample-app
